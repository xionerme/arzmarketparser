<!doctype html>
<html lang="ru" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arz Market Search</title>

  <link
    href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta24/dist/css/tabler.min.css"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"
  />

  <style>
    :root {
      --site-bg-dark:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.18), transparent 28%),
        radial-gradient(circle at top right, rgba(139, 92, 246, 0.16), transparent 24%),
        linear-gradient(180deg, #0b1020 0%, #111827 45%, #0f172a 100%);
      --site-bg-light:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.10), transparent 28%),
        radial-gradient(circle at top right, rgba(139, 92, 246, 0.08), transparent 24%),
        linear-gradient(180deg, #f8fbff 0%, #eef4ff 45%, #e9eefb 100%);
      --card-bg-dark: rgba(17, 24, 39, 0.72);
      --card-bg-light: rgba(255, 255, 255, 0.82);
      --dropdown-bg-dark: #152238;
      --dropdown-bg-light: #ffffff;
      --dropdown-shadow-dark: 0 18px 40px rgba(0, 0, 0, 0.22);
      --dropdown-shadow-light: 0 18px 40px rgba(15, 23, 42, 0.14);
    }

    html, body {
      min-height: 100%;
      margin: 0;
    }

    body {
      background: var(--site-bg-dark);
      background-attachment: fixed;
      background-repeat: no-repeat;
      background-size: cover;
      transition: background .25s ease, color .25s ease;
    }

    html[data-bs-theme="light"] body {
      background: var(--site-bg-light);
      background-attachment: fixed;
      background-repeat: no-repeat;
      background-size: cover;
    }

    .page {
      min-height: 100vh;
      position: relative;
    }

    .hero-card,
    .main-card,
    .results-card {
      backdrop-filter: blur(10px);
      overflow: visible;
      position: relative;
      border: 1px solid var(--tblr-border-color);
      background: var(--card-bg-dark);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.16);
    }

    html[data-bs-theme="light"] .hero-card,
    html[data-bs-theme="light"] .main-card,
    html[data-bs-theme="light"] .results-card {
      background: var(--card-bg-light);
      box-shadow: 0 12px 40px rgba(15, 23, 42, 0.08);
    }

    .main-card {
      z-index: 30;
    }

    .results-card {
      z-index: 1;
    }

    .search-wrap {
      position: relative;
      z-index: 10000;
    }

    .suggestions {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      z-index: 9999;
      background: var(--dropdown-bg-dark);
      border: 1px solid var(--tblr-border-color);
      border-radius: 14px;
      box-shadow: var(--dropdown-shadow-dark);
      overflow: hidden;
      display: none;
      max-height: 320px;
      overflow-y: auto;
    }

    html[data-bs-theme="light"] .suggestions {
      background: var(--dropdown-bg-light);
      box-shadow: var(--dropdown-shadow-light);
    }

    .suggestion-item {
      padding: 12px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--tblr-border-color);
      transition: background-color .15s ease;
    }

    .suggestion-item:last-child {
      border-bottom: none;
    }

    .suggestion-item:hover,
    .suggestion-item.active {
      background: rgba(var(--tblr-primary-rgb), .08);
    }

    .suggestion-title {
      font-size: 14px;
      line-height: 1.3;
      color: var(--tblr-body-color);
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 1rem;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    .hero-title {
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.05;
      margin: 0;
    }

    .soft-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(var(--tblr-primary-rgb), .12);
      color: var(--tblr-primary);
      font-size: 20px;
      flex-shrink: 0;
    }

    .toolbar-row {
      gap: .75rem;
    }

    .price-good {
      color: var(--tblr-success);
      font-weight: 700;
    }

    .card-stat {
      border: 1px solid var(--tblr-border-color);
      border-radius: 14px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.03);
    }

    html[data-bs-theme="light"] .card-stat {
      background: rgba(255, 255, 255, 0.72);
    }

    .theme-toggle-icon {
      font-size: 16px;
    }

    .empty-state {
      border: 1px dashed var(--tblr-border-color);
      border-radius: 16px;
      padding: 28px 18px;
      text-align: center;
      background: rgba(255, 255, 255, 0.02);
    }

    html[data-bs-theme="light"] .empty-state {
      background: rgba(255, 255, 255, 0.58);
    }

    .result-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--tblr-border-color);
    }

    html[data-bs-theme="light"] .result-card {
      background: rgba(255, 255, 255, 0.74);
    }

    .result-card .card-body {
      padding: 1rem;
    }

    .result-card .ti {
      opacity: .85;
      margin-right: 6px;
    }

    .hero-actions {
      display: flex;
      gap: .75rem;
      align-items: center;
    }

    @media (max-width: 767px) {
      .hero-actions {
        width: 100%;
      }

      .hero-actions .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="container-xl py-4 py-lg-5">
      <div class="row justify-content-center">
        <div class="col-12 col-xl-10">

          <div class="card hero-card mb-4">
            <div class="card-body p-4">
              <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3">
                <div class="d-flex align-items-start gap-3">
                  <div class="soft-icon">
                    <i class="ti ti-package"></i>
                  </div>
                  <div>
                    <h1 class="hero-title">Поиск предметов Arz Market</h1>
                    <div class="text-secondary mt-2">
                      Вводи название предмета или ID, выбирай сервер или все сервера, сортируй по цене и быстро смотри, кто продаёт нужный предмет.
                    </div>
                  </div>
                </div>

                <div class="hero-actions">
                  <button id="themeToggleBtn" class="btn btn-outline-primary">
                    <i id="themeToggleIcon" class="ti ti-moon-stars theme-toggle-icon"></i>
                    <span id="themeToggleText">Тёмная тема</span>
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div class="card main-card mb-4">
            <div class="card-body">
              <div class="row g-3 align-items-end">
                <div class="col-12 col-lg-5">
                  <label class="form-label">
                    <i class="ti ti-search"></i>
                    Название предмета или ID
                  </label>
                  <div class="search-wrap">
                    <input
                      id="itemInput"
                      type="text"
                      class="form-control"
                      placeholder="Например: Бандана, Твисти, талон, 22, 5723"
                      autocomplete="off"
                    />
                    <div id="suggestions" class="suggestions"></div>
                  </div>
                </div>

                <div class="col-12 col-md-4 col-lg-2">
                  <label class="form-label">
                    <i class="ti ti-server"></i>
                    Сервер
                  </label>
                  <select id="serverSelect" class="form-select"></select>
                </div>

                <div class="col-12 col-md-4 col-lg-2">
                  <label class="form-label">
                    <i class="ti ti-exchange"></i>
                    Режим
                  </label>
                  <select id="marketModeSelect" class="form-select">
                    <option value="sell">Продажа</option>
                    <option value="buy">Покупка</option>
                  </select>
                </div>

                <div class="col-12 col-md-4 col-lg-3">
                  <label class="form-label">
                    <i class="ti ti-sort-ascending-2"></i>
                    Сортировка
                  </label>
                  <select id="sortSelect" class="form-select">
                    <option value="price-asc">Цена: сначала дешёвые</option>
                    <option value="price-desc">Цена: сначала дорогие</option>
                  </select>
                </div>

                <div class="col-12 col-md-4 col-lg-2">
                  <button id="searchBtn" class="btn btn-primary w-100">
                    <i class="ti ti-search"></i>
                    Найти
                  </button>
                </div>
              </div>

              <div class="mt-3 text-secondary small">
                Можно вводить часть названия или просто ID. Подсказки появятся автоматически.
              </div>
            </div>
          </div>

          <div class="card results-card">
            <div class="card-body">
              <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between toolbar-row mb-3">
                <div class="d-flex align-items-center gap-2 flex-wrap">
                  <span class="badge bg-blue-lt">
                    <i class="ti ti-shopping-cart me-1"></i>
                    Arz Market Search
                  </span>
                  <span class="badge bg-azure-lt">
                    <i class="ti ti-bolt me-1"></i>
                    Быстрый поиск
                  </span>
                </div>

                <div id="status" class="text-secondary">
                  Готово.
                </div>
              </div>

              <div id="resultsMeta" class="row g-2 mb-3"></div>
              <div id="results"></div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script>
    const ITEMS_URL = "https://raw.githubusercontent.com/FREYM1337/forumnick/main/ArzMarketV3/items.json";
    const MARKET_URL = (serverId) => `https://arzmarker.jomeyjq.workers.dev/?server=${serverId}`;

    const itemInput = document.getElementById("itemInput");
    const serverSelect = document.getElementById("serverSelect");
    const sortSelect = document.getElementById("sortSelect");
    const marketModeSelect = document.getElementById("marketModeSelect");
    const searchBtn = document.getElementById("searchBtn");
    const statusEl = document.getElementById("status");
    const resultsEl = document.getElementById("results");
    const resultsMetaEl = document.getElementById("resultsMeta");
    const suggestionsEl = document.getElementById("suggestions");
    const themeToggleBtn = document.getElementById("themeToggleBtn");
    const themeToggleIcon = document.getElementById("themeToggleIcon");
    const themeToggleText = document.getElementById("themeToggleText");

    let itemsMap = {};
    let itemsEntries = [];
    let currentSuggestions = [];
    let activeSuggestionIndex = -1;
    let currentResults = [];
    let currentTargetItem = null;
    let currentServerId = null;
    let currentMarketMode = "sell";

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, (m) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[m]));
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function formatNumber(num) {
      try {
        return Number(num).toLocaleString("ru-RU");
      } catch {
        return String(num);
      }
    }

    function normalize(str) {
      return String(str).trim().toLowerCase().replace(/\s+/g, " ");
    }

    function extractItemId(value) {
      if (typeof value === "number") return value;
      if (typeof value === "string") {
        const match = value.match(/^(\d+)/);
        if (match) return Number(match[1]);
      }
      return null;
    }

    function fillServers() {
      const allOption = document.createElement("option");
      allOption.value = "all";
      allOption.textContent = "Все сервера";
      serverSelect.appendChild(allOption);

      for (let i = 0; i <= 32; i++) {
        const option = document.createElement("option");
        option.value = i;
        option.textContent = `Сервер ${i}`;
        serverSelect.appendChild(option);
      }
    }

    async function loadItems() {
      setStatus("Загружаю список предметов...");
      const res = await fetch(ITEMS_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      itemsMap = await res.json();
      itemsEntries = Object.entries(itemsMap).map(([id, name]) => ({
        id: Number(id),
        name: String(name)
      }));

      setStatus(`Загружено предметов: ${itemsEntries.length}`);
    }

    function scoreItemMatch(item, queryRaw) {
      const name = normalize(item.name);
      const idText = String(item.id);
      const query = normalize(queryRaw);

      if (!query) return -1;

      if (/^\d+$/.test(query)) {
        if (idText === query) return 10000;
        if (idText.includes(query)) return 6000;
        return -1;
      }

      const words = query.split(" ").filter(Boolean);
      const nameWords = name.split(" ").filter(Boolean);

      let score = 0;
      let matchedWords = 0;

      if (name === query) return 20000;

      for (const word of words) {
        let matched = false;

        for (const n of nameWords) {
          if (n === word) {
            score += 4000;
            matched = true;
            break;
          }

          if (n.startsWith(word)) {
            score += 2500;
            matched = true;
            break;
          }

          if (n.includes(word)) {
            score += 1500;
            matched = true;
            break;
          }
        }

        if (matched) matchedWords++;
      }

      if (matchedWords === words.length) {
        score += 5000;
      }

      if (matchedWords > 0) {
        score += matchedWords * 500;
      }

      if (name.includes(query)) {
        score += 2000;
      }

      if (score === 0) return -1;

      return score;
    }

    function findItemMatches(query, limit = 8) {
      const q = normalize(query);
      if (!q) return [];

      const scored = [];

      for (const item of itemsEntries) {
        const score = scoreItemMatch(item, q);
        if (score >= 0) {
          scored.push({ ...item, _score: score });
        }
      }

      scored.sort((a, b) => {
        if (b._score !== a._score) return b._score - a._score;
        return a.name.localeCompare(b.name, "ru");
      });

      return scored.slice(0, limit).map(({ _score, ...item }) => item);
    }

    function hideSuggestions() {
      suggestionsEl.style.display = "none";
      suggestionsEl.innerHTML = "";
      currentSuggestions = [];
      activeSuggestionIndex = -1;
    }

    function showSuggestions(items) {
      currentSuggestions = items;
      activeSuggestionIndex = -1;

      if (!items.length) {
        hideSuggestions();
        return;
      }

      suggestionsEl.innerHTML = items.map((item, index) => `
        <div class="suggestion-item" data-index="${index}">
          <div class="d-flex align-items-center gap-2">
            <i class="ti ti-package text-primary"></i>
            <div class="suggestion-title">${escapeHtml(item.name)}</div>
          </div>
          <span class="badge bg-blue-lt">ID ${item.id}</span>
        </div>
      `).join("");

      suggestionsEl.style.display = "block";

      suggestionsEl.querySelectorAll(".suggestion-item").forEach(el => {
        el.addEventListener("mousedown", (e) => {
          e.preventDefault();
          const index = Number(el.dataset.index);
          selectSuggestion(index);
        });
      });
    }

    function updateActiveSuggestion() {
      const els = suggestionsEl.querySelectorAll(".suggestion-item");
      els.forEach((el, idx) => {
        el.classList.toggle("active", idx === activeSuggestionIndex);
      });
    }

    function selectSuggestion(index) {
      const item = currentSuggestions[index];
      if (!item) return;
      itemInput.value = item.name;
      hideSuggestions();
    }

    function getModeLabel(mode) {
      return mode === "buy" ? "Покупка" : "Продажа";
    }

    function getModeVerb(mode) {
      return mode === "buy" ? "покупает" : "продаёт";
    }

    function getModeBadgeClass(mode) {
      return mode === "buy" ? "bg-azure-lt" : "bg-green-lt";
    }

    function renderMeta(targetItem, serverId, count, mode) {
      resultsMetaEl.innerHTML = `
        <div class="col-12 col-md-6 col-xl-3">
          <div class="card-stat">
            <div class="text-secondary small mb-1"><i class="ti ti-package"></i> Предмет</div>
            <div class="fw-bold">${escapeHtml(targetItem.name)}</div>
          </div>
        </div>
        <div class="col-6 col-md-6 col-xl-3">
          <div class="card-stat">
            <div class="text-secondary small mb-1"><i class="ti ti-server"></i> Сервер</div>
            <div class="fw-bold mono">${escapeHtml(String(serverId))}</div>
          </div>
        </div>
        <div class="col-6 col-md-6 col-xl-3">
          <div class="card-stat">
            <div class="text-secondary small mb-1"><i class="ti ti-exchange"></i> Режим</div>
            <div class="fw-bold mono">${getModeLabel(mode)}</div>
          </div>
        </div>
        <div class="col-12 col-md-6 col-xl-3">
          <div class="card-stat">
            <div class="text-secondary small mb-1"><i class="ti ti-list-search"></i> Найдено</div>
            <div class="fw-bold mono">${count}</div>
          </div>
        </div>
      `;
    }

    function sortResults(list) {
      const mode = sortSelect.value;

      return [...list].sort((a, b) => {
        const aPrice = a.price == null ? (mode === "price-asc" ? Infinity : -Infinity) : Number(a.price);
        const bPrice = b.price == null ? (mode === "price-asc" ? Infinity : -Infinity) : Number(b.price);

        if (mode === "price-desc") {
          return bPrice - aPrice;
        }

        return aPrice - bPrice;
      });
    }

    function renderResults(found, mode) {
      if (!found.length) {
        resultsEl.innerHTML = `
          <div class="empty-state">
            <div class="mb-2 fs-1 text-warning">
              <i class="ti ti-mood-empty"></i>
            </div>
            <div class="fw-bold mb-1">Ничего не найдено</div>
            <div class="text-secondary">
              На выбранном сервере этот предмет сейчас не найден в режиме «${escapeHtml(getModeLabel(mode))}».
            </div>
          </div>
        `;
        return;
      }

      const sorted = sortResults(found);

      resultsEl.innerHTML = `
        <div class="result-grid">
          ${sorted.map(entry => `
            <div class="card result-card">
              <div class="card-body">
                <div class="d-flex align-items-start justify-content-between gap-3 mb-3">
                  <div>
                    <h3 class="card-title mb-1">${escapeHtml(entry.itemName)}</h3>
                    <div class="text-secondary small">
                      <i class="ti ti-user"></i>${escapeHtml(entry.username || "—")}
                    </div>
                  </div>
                  <span class="badge ${getModeBadgeClass(mode)}">
                    <i class="ti ti-cash"></i>
                    ${entry.price != null ? formatNumber(entry.price) : "—"}
                  </span>
                </div>

                <div class="row g-3">
                  <div class="col-6">
                    <div class="text-secondary small">
                      <i class="ti ti-server"></i>Сервер
                    </div>
                    <div class="fw-bold mono">${entry.serverId ?? "—"}</div>
                  </div>

                  <div class="col-6">
                    <div class="text-secondary small">
                      <i class="ti ti-building-store"></i>Лавка
                    </div>
                    <div class="fw-bold mono">${entry.lavkaUid ?? "—"}</div>
                  </div>

                  <div class="col-6">
                    <div class="text-secondary small">
                      <i class="ti ti-stack-2"></i>Количество
                    </div>
                    <div class="fw-bold">${entry.count ?? "—"}</div>
                  </div>

                  <div class="col-6">
                    <div class="text-secondary small">
                      <i class="ti ti-wallet"></i>${getModeLabel(mode)}
                    </div>
                    <div class="price-good">
                      ${entry.price != null ? formatNumber(entry.price) : "—"}
                    </div>
                  </div>
                </div>

                <div class="mt-3 text-secondary small">
                  <i class="ti ti-info-circle"></i>
                  Игрок ${escapeHtml(getModeVerb(mode))} этот предмет.
                </div>
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function rerenderCurrentResults() {
      if (!currentTargetItem || currentServerId == null) return;
      renderMeta(currentTargetItem, currentServerId, currentResults.length, currentMarketMode);
      renderResults(currentResults, currentMarketMode);
    }

    async function searchItem() {
      const query = itemInput.value.trim();
      const serverId = serverSelect.value;
      const marketMode = marketModeSelect.value;

      resultsEl.innerHTML = "";
      resultsMetaEl.innerHTML = "";
      hideSuggestions();

      currentResults = [];
      currentTargetItem = null;
      currentServerId = null;

      if (!query) {
        setStatus("Введите название предмета или ID.");
        return;
      }

      const matches = findItemMatches(query, 20);

      if (!matches.length) {
        setStatus("Предмет не найден.");
        resultsEl.innerHTML = `
          <div class="empty-state">
            <div class="mb-2 fs-1 text-danger">
              <i class="ti ti-search-off"></i>
            </div>
            <div class="fw-bold mb-1">Предмет не найден</div>
            <div class="text-secondary">
              Попробуй другое название или ID.
            </div>
          </div>
        `;
        return;
      }

      const targetItem = matches[0];
      const displayServer = serverId === "all" ? "Все сервера" : `Сервер ${serverId}`;

      setStatus(`Ищу ${targetItem.name} (${getModeLabel(marketMode).toLowerCase()})...`);

      let allMarketData = [];

      try {
        if (serverId === "all") {
          const requests = [];

          for (let i = 0; i <= 32; i++) {
            requests.push(
              fetch(MARKET_URL(i))
                .then(res => res.ok ? res.json() : [])
                .then(data => data.map(item => ({
                  ...item,
                  serverId: item.serverId ?? i
                })))
                .catch(() => [])
            );
          }

          const results = await Promise.all(requests);
          allMarketData = results.flat();
        } else {
          const res = await fetch(MARKET_URL(serverId));
          if (!res.ok) throw new Error(`HTTP ${res.status}`);

          const data = await res.json();
          allMarketData = data.map(item => ({
            ...item,
            serverId: item.serverId ?? serverId
          }));
        }
      } catch (err) {
        setStatus(`Ошибка загрузки данных: ${err.message}`);
        resultsEl.innerHTML = `
          <div class="empty-state">
            <div class="mb-2 fs-1 text-danger">
              <i class="ti ti-alert-circle"></i>
            </div>
            <div class="fw-bold mb-1">Не удалось загрузить данные</div>
            <div class="text-secondary">
              Не удалось загрузить маркетплейс для выбранного сервера.
            </div>
          </div>
        `;
        return;
      }

      const found = [];
      const itemsKey = marketMode === "buy" ? "items_buy" : "items_sell";
      const pricesKey = marketMode === "buy" ? "price_buy" : "price_sell";
      const countsKey = marketMode === "buy" ? "count_buy" : "count_sell";

      for (const stall of allMarketData) {
        const itemsList = Array.isArray(stall[itemsKey]) ? stall[itemsKey] : [];
        const pricesList = Array.isArray(stall[pricesKey]) ? stall[pricesKey] : [];
        const countsList = Array.isArray(stall[countsKey]) ? stall[countsKey] : [];

        for (let i = 0; i < itemsList.length; i++) {
          const rawItem = itemsList[i];
          const itemId = extractItemId(rawItem);

          if (itemId === targetItem.id) {
            found.push({
              lavkaUid: stall.LavkaUid,
              username: stall.username,
              serverId: stall.serverId,
              itemId,
              itemName: targetItem.name,
              price: pricesList[i] ?? null,
              count: countsList[i] ?? null
            });
          }
        }
      }

      currentResults = found;
      currentTargetItem = targetItem;
      currentServerId = displayServer;
      currentMarketMode = marketMode;

      renderMeta(targetItem, displayServer, found.length, marketMode);
      renderResults(found, marketMode);

      setStatus(found.length ? `Поиск завершён: ${getModeLabel(marketMode).toLowerCase()}.` : "Ничего не найдено.");
    }

    function applyTheme(theme) {
      document.documentElement.setAttribute("data-bs-theme", theme);
      localStorage.setItem("arz-theme", theme);

      if (theme === "light") {
        themeToggleIcon.className = "ti ti-sun theme-toggle-icon";
        themeToggleText.textContent = "Светлая тема";
      } else {
        themeToggleIcon.className = "ti ti-moon-stars theme-toggle-icon";
        themeToggleText.textContent = "Тёмная тема";
      }
    }

    function initTheme() {
      const savedTheme = localStorage.getItem("arz-theme");

      if (savedTheme === "light" || savedTheme === "dark") {
        applyTheme(savedTheme);
        return;
      }

      const prefersLight = window.matchMedia("(prefers-color-scheme: light)").matches;
      applyTheme(prefersLight ? "light" : "dark");
    }

    itemInput.addEventListener("input", () => {
      const query = itemInput.value.trim();

      if (!query) {
        hideSuggestions();
        return;
      }

      showSuggestions(findItemMatches(query));
    });

    itemInput.addEventListener("focus", () => {
      const query = itemInput.value.trim();

      if (!query) return;

      showSuggestions(findItemMatches(query));
    });

    itemInput.addEventListener("keydown", (e) => {
      if (currentSuggestions.length && suggestionsEl.style.display === "block") {
        if (e.key === "ArrowDown") {
          e.preventDefault();
          activeSuggestionIndex = (activeSuggestionIndex + 1) % currentSuggestions.length;
          updateActiveSuggestion();
          return;
        }

        if (e.key === "ArrowUp") {
          e.preventDefault();
          activeSuggestionIndex = activeSuggestionIndex <= 0
            ? currentSuggestions.length - 1
            : activeSuggestionIndex - 1;
          updateActiveSuggestion();
          return;
        }

        if (e.key === "Enter" && activeSuggestionIndex >= 0) {
          e.preventDefault();
          selectSuggestion(activeSuggestionIndex);
          searchItem();
          return;
        }

        if (e.key === "Escape") {
          hideSuggestions();
          return;
        }
      }

      if (e.key === "Enter") {
        searchItem();
      }
    });

    document.addEventListener("click", (e) => {
      if (!suggestionsEl.contains(e.target) && e.target !== itemInput) {
        hideSuggestions();
      }
    });

    searchBtn.addEventListener("click", searchItem);

    sortSelect.addEventListener("change", () => {
      rerenderCurrentResults();
    });

    themeToggleBtn.addEventListener("click", () => {
      const current = document.documentElement.getAttribute("data-bs-theme") || "dark";
      applyTheme(current === "dark" ? "light" : "dark");
    });

    (async () => {
      initTheme();
      fillServers();

      try {
        await loadItems();
      } catch (err) {
        setStatus(`Ошибка: ${err.message}`);
        resultsEl.innerHTML = `
          <div class="empty-state">
            <div class="mb-2 fs-1 text-danger">
              <i class="ti ti-alert-triangle"></i>
            </div>
            <div class="fw-bold mb-1">Ошибка загрузки</div>
            <div class="text-secondary">
              Не удалось загрузить список предметов.
            </div>
          </div>
        `;
      }
    })();
  </script>
</body>
</html>
