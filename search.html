<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arz Market Search</title>

  <link
    href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta24/dist/css/tabler.min.css"
    rel="stylesheet"
  />

  <style>
    body {
      background: #0f172a;
    }

    .page {
      min-height: 100vh;
    }

    .search-wrap {
      position: relative;
    }

    .suggestions {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      z-index: 1000;
      background: #1e293b;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      box-shadow: 0 12px 30px rgba(0,0,0,.35);
      overflow: hidden;
      display: none;
      max-height: 320px;
      overflow-y: auto;
    }

    .suggestion-item {
      padding: 12px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }

    .suggestion-item:last-child {
      border-bottom: none;
    }

    .suggestion-item:hover,
    .suggestion-item.active {
      background: rgba(255,255,255,.06);
    }

    .suggestion-title {
      color: #f8fafc;
      font-size: 14px;
      line-height: 1.3;
    }

    .suggestion-badge {
      font-size: 12px;
      white-space: nowrap;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="container-xl py-4">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-10">
          <div class="mb-4">
            <h1 class="text-white mb-2">Поиск предметов Arz Market</h1>
            <div class="text-secondary">
              Вводи название предмета или ID, выбирай сервер и смотри, кто продаёт.
            </div>
          </div>

          <div class="card mb-4">
            <div class="card-body">
              <div class="row g-3 align-items-end">
                <div class="col-12 col-md-6">
                  <label class="form-label">Название предмета или ID</label>
                  <div class="search-wrap">
                    <input
                      id="itemInput"
                      type="text"
                      class="form-control"
                      placeholder="Например: Бандана, Твисти, 22, 5723"
                      autocomplete="off"
                    />
                    <div id="suggestions" class="suggestions"></div>
                  </div>
                </div>

                <div class="col-12 col-md-3">
                  <label class="form-label">Сервер</label>
                  <select id="serverSelect" class="form-select"></select>
                </div>

                <div class="col-12 col-md-3">
                  <button id="searchBtn" class="btn btn-primary w-100">
                    Найти
                  </button>
                </div>
              </div>

              <div class="mt-3 text-secondary small">
                Можно вводить часть названия или просто ID. Подсказки появятся автоматически.
              </div>
            </div>
          </div>

          <div class="card mb-4">
            <div class="card-body">
              <div class="d-flex flex-wrap gap-2 align-items-center justify-content-between mb-3">
                <div>
                  <span class="badge bg-blue-lt">Arz Market Search</span>
                </div>
                <div id="status" class="text-secondary">Готово.</div>
              </div>

              <div id="resultsMeta" class="d-flex flex-wrap gap-2 mb-3"></div>
              <div id="results"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const ITEMS_URL = "https://raw.githubusercontent.com/FREYM1337/forumnick/main/ArzMarketV3/items.json";
    const MARKET_URL = (serverId) => `https://arzmarker.jomeyjq.workers.dev/?server=${serverId}`;

    const itemInput = document.getElementById("itemInput");
    const serverSelect = document.getElementById("serverSelect");
    const searchBtn = document.getElementById("searchBtn");
    const statusEl = document.getElementById("status");
    const resultsEl = document.getElementById("results");
    const resultsMetaEl = document.getElementById("resultsMeta");
    const suggestionsEl = document.getElementById("suggestions");

    let itemsMap = {};
    let itemsEntries = [];
    let currentSuggestions = [];
    let activeSuggestionIndex = -1;

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, (m) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[m]));
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function formatNumber(num) {
      try {
        return Number(num).toLocaleString("ru-RU");
      } catch {
        return String(num);
      }
    }

    function normalize(str) {
      return String(str).trim().toLowerCase();
    }

    function extractItemId(value) {
      if (typeof value === "number") return value;
      if (typeof value === "string") {
        const match = value.match(/^(\d+)/);
        if (match) return Number(match[1]);
      }
      return null;
    }

    function fillServers() {
      for (let i = 0; i <= 32; i++) {
        const option = document.createElement("option");
        option.value = i;
        option.textContent = `Сервер ${i}`;
        serverSelect.appendChild(option);
      }
    }

    async function loadItems() {
      setStatus("Загружаю список предметов...");
      const res = await fetch(ITEMS_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      itemsMap = await res.json();
      itemsEntries = Object.entries(itemsMap).map(([id, name]) => ({
        id: Number(id),
        name: String(name)
      }));

      setStatus(`Загружено предметов: ${itemsEntries.length}`);
    }

    function findItemMatches(query) {
      const q = normalize(query);
      if (!q) return [];

      if (/^\d+$/.test(q)) {
        const exact = itemsMap[q];
        if (exact) return [{ id: Number(q), name: exact }];

        return itemsEntries
          .filter(item => String(item.id).includes(q))
          .slice(0, 8);
      }

      const starts = [];
      const contains = [];

      for (const item of itemsEntries) {
        const name = item.name.toLowerCase();
        const idText = String(item.id);

        if (name.startsWith(q) || idText.startsWith(q)) {
          starts.push(item);
        } else if (name.includes(q) || idText.includes(q)) {
          contains.push(item);
        }
      }

      return [...starts, ...contains].slice(0, 8);
    }

    function hideSuggestions() {
      suggestionsEl.style.display = "none";
      suggestionsEl.innerHTML = "";
      currentSuggestions = [];
      activeSuggestionIndex = -1;
    }

    function showSuggestions(items) {
      currentSuggestions = items;
      activeSuggestionIndex = -1;

      if (!items.length) {
        hideSuggestions();
        return;
      }

      suggestionsEl.innerHTML = items.map((item, index) => `
        <div class="suggestion-item" data-index="${index}">
          <div class="suggestion-title">${escapeHtml(item.name)}</div>
          <span class="badge bg-blue-lt suggestion-badge">ID ${item.id}</span>
        </div>
      `).join("");

      suggestionsEl.style.display = "block";

      suggestionsEl.querySelectorAll(".suggestion-item").forEach(el => {
        el.addEventListener("mousedown", (e) => {
          e.preventDefault();
          const index = Number(el.dataset.index);
          selectSuggestion(index);
        });
      });
    }

    function updateActiveSuggestion() {
      const els = suggestionsEl.querySelectorAll(".suggestion-item");
      els.forEach((el, idx) => {
        el.classList.toggle("active", idx === activeSuggestionIndex);
      });
    }

    function selectSuggestion(index) {
      const item = currentSuggestions[index];
      if (!item) return;
      itemInput.value = item.name;
      hideSuggestions();
    }

    function renderMeta(targetItem, serverId, count) {
      resultsMetaEl.innerHTML = `
        <span class="badge bg-azure-lt">Предмет: ${escapeHtml(targetItem.name)}</span>
        <span class="badge bg-indigo-lt">ID: ${targetItem.id}</span>
        <span class="badge bg-cyan-lt">Сервер: ${serverId}</span>
        <span class="badge bg-green-lt">Найдено: ${count}</span>
      `;
    }

    function renderResults(found) {
      resultsEl.innerHTML = `
        <div class="result-grid">
          ${found.map(entry => `
            <div class="card">
              <div class="card-body">
                <h3 class="card-title mb-3">${escapeHtml(entry.itemName)}</h3>

                <div class="row g-3">
                  <div class="col-6">
                    <div class="text-secondary small">ID предмета</div>
                    <div class="fw-bold mono">${entry.itemId}</div>
                  </div>

                  <div class="col-6">
                    <div class="text-secondary small">Сервер</div>
                    <div class="fw-bold mono">${entry.serverId ?? "—"}</div>
                  </div>

                  <div class="col-6">
                    <div class="text-secondary small">Лавка</div>
                    <div class="fw-bold mono">${entry.lavkaUid ?? "—"}</div>
                  </div>

                  <div class="col-6">
                    <div class="text-secondary small">Количество</div>
                    <div class="fw-bold">${entry.count ?? "—"}</div>
                  </div>

                  <div class="col-12">
                    <div class="text-secondary small">Продавец</div>
                    <div class="fw-bold">${escapeHtml(entry.username || "—")}</div>
                  </div>

                  <div class="col-6">
                    <div class="text-secondary small">Цена</div>
                    <div class="fw-bold text-green">${entry.price != null ? formatNumber(entry.price) : "—"}</div>
                  </div>

                  <div class="col-12">
                    <div class="text-secondary small">Значение в items_sell</div>
                    <div class="mono">${escapeHtml(String(entry.rawItem))}</div>
                  </div>
                </div>
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    async function searchItem() {
      const query = itemInput.value.trim();
      const serverId = serverSelect.value;

      resultsEl.innerHTML = "";
      resultsMetaEl.innerHTML = "";
      hideSuggestions();

      if (!query) {
        setStatus("Введите название предмета или ID.");
        return;
      }

      const matches = findItemMatches(query);
      if (!matches.length) {
        setStatus("Предмет не найден.");
        resultsEl.innerHTML = `
          <div class="alert alert-danger mb-0">
            Ничего не найдено. Попробуй другое название или ID.
          </div>
        `;
        return;
      }

      let targetItem;
      if (/^\d+$/.test(query)) {
        targetItem = matches[0];
      } else {
        targetItem = matches.find(x => normalize(x.name) === normalize(query)) || matches[0];
      }

      setStatus(`Ищу ${targetItem.name} на сервере ${serverId}...`);

      let marketData;
      try {
        const res = await fetch(MARKET_URL(serverId));
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        marketData = await res.json();
      } catch (err) {
        setStatus(`Ошибка загрузки данных: ${err.message}`);
        resultsEl.innerHTML = `
          <div class="alert alert-danger mb-0">
            Не удалось загрузить маркетплейс для сервера ${serverId}.
          </div>
        `;
        return;
      }

      const found = [];

      for (const stall of marketData) {
        const itemsSell = Array.isArray(stall.items_sell) ? stall.items_sell : [];
        const pricesSell = Array.isArray(stall.price_sell) ? stall.price_sell : [];
        const countsSell = Array.isArray(stall.count_sell) ? stall.count_sell : [];

        for (let i = 0; i < itemsSell.length; i++) {
          const rawItem = itemsSell[i];
          const itemId = extractItemId(rawItem);

          if (itemId === targetItem.id) {
            found.push({
              lavkaUid: stall.LavkaUid,
              username: stall.username,
              serverId: stall.serverId,
              rawItem,
              itemId,
              itemName: targetItem.name,
              price: pricesSell[i] ?? null,
              count: countsSell[i] ?? null
            });
          }
        }
      }

      renderMeta(targetItem, serverId, found.length);

      if (!found.length) {
        setStatus("Ничего не найдено.");
        resultsEl.innerHTML = `
          <div class="alert alert-warning mb-0">
            На сервере ${serverId} этот предмет не найден в продаже.
          </div>
        `;
        return;
      }

      renderResults(found);
      setStatus(`Готово. Найдено лотов: ${found.length}`);
    }

    itemInput.addEventListener("input", () => {
      const query = itemInput.value.trim();
      if (!query) {
        hideSuggestions();
        return;
      }
      showSuggestions(findItemMatches(query));
    });

    itemInput.addEventListener("focus", () => {
      const query = itemInput.value.trim();
      if (!query) return;
      showSuggestions(findItemMatches(query));
    });

    itemInput.addEventListener("keydown", (e) => {
      if (currentSuggestions.length && suggestionsEl.style.display === "block") {
        if (e.key === "ArrowDown") {
          e.preventDefault();
          activeSuggestionIndex = (activeSuggestionIndex + 1) % currentSuggestions.length;
          updateActiveSuggestion();
          return;
        }

        if (e.key === "ArrowUp") {
          e.preventDefault();
          activeSuggestionIndex = activeSuggestionIndex <= 0
            ? currentSuggestions.length - 1
            : activeSuggestionIndex - 1;
          updateActiveSuggestion();
          return;
        }

        if (e.key === "Enter" && activeSuggestionIndex >= 0) {
          e.preventDefault();
          selectSuggestion(activeSuggestionIndex);
          searchItem();
          return;
        }

        if (e.key === "Escape") {
          hideSuggestions();
          return;
        }
      }

      if (e.key === "Enter") {
        searchItem();
      }
    });

    document.addEventListener("click", (e) => {
      if (!suggestionsEl.contains(e.target) && e.target !== itemInput) {
        hideSuggestions();
      }
    });

    searchBtn.addEventListener("click", searchItem);

    (async () => {
      fillServers();
      try {
        await loadItems();
      } catch (err) {
        setStatus(`Ошибка: ${err.message}`);
        resultsEl.innerHTML = `
          <div class="alert alert-danger mb-0">
            Не удалось загрузить список предметов.
          </div>
        `;
      }
    })();
  </script>
</body>
</html>
